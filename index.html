<!-- SIDEBAR -->

<style>

.sidebar{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:#0d6efd;
padding-top:20px;
overflow:auto;
}

.sidebar h2{
color:white;
text-align:center;
margin-bottom:20px;
}

.sidebar button{
width:90%;
margin:10px auto;
display:block;
background:white;
color:#0d6efd;
font-weight:bold;
border:none;
padding:12px;
border-radius:8px;
cursor:pointer;
}

.sidebar button:hover{
background:#e9ecef;
}

.mainContent{
margin-left:240px;
padding:10px;
}

.page{
display:none;
}

.activePage{
display:block;
}

@media(max-width:768px){

.sidebar{
width:100%;
height:auto;
position:relative;
}

.mainContent{
margin-left:0;
}

}

</style>

<!-- SIDEBAR MENU -->

<div class="sidebar">

<h2>AR Distribution</h2>

<button onclick="showPage('dashboardPage')">
Dashboard
</button>

<button onclick="showPage('productPage')">
Products
</button>

<button onclick="showPage('purchasePage')">
Purchase
</button>

<button onclick="showPage('salesPage')">
Sales
</button>

<button onclick="showPage('returnPage')">
Returns
</button>

<button onclick="showPage('reportPage')">
Reports
</button>

</div>

<!-- MAIN CONTENT -->

<div class="mainContent">

<!-- DASHBOARD PAGE -->

<div id="dashboardPage" class="page activePage">

<div class="box">

<h2>Dashboard</h2>

<p id="totalStock">Total Stock: 0</p>

</div>

</div>

<!-- PRODUCT PAGE -->

<div id="productPage" class="page">

<div class="box">

<h2>Add Product</h2>

<input type="text" id="newProductName" placeholder="Product Name">

<input type="number" id="newBuyPrice" placeholder="Buy Price">

<input type="number" id="newSellPrice" placeholder="Sell Price">

<input type="number" id="openingStock" placeholder="Opening Stock">

<button onclick="addNewProduct()">
Add Product
</button>

</div>

<div class="box">

<h2>Product List</h2>

<div id="productList"></div>

</div>

</div>

<!-- PURCHASE PAGE -->

<div id="purchasePage" class="page">

<div class="box">

<h2>Purchase Entry</h2>

<select id="purchaseProduct">
<option value="">Select Product</option>
</select>

<input type="number" id="purchaseQty"
placeholder="Purchase Quantity">

<button onclick="savePurchase()">
Add Stock
</button>

</div>

<div class="box">

<h2>Purchase History</h2>

<div id="purchaseList"></div>

</div>

</div>

<!-- SALES PAGE -->

<div id="salesPage" class="page">

<div class="box">

<h2>Order Entry</h2>

<input type="text" id="customerName"
placeholder="Customer Name">

<select id="orderProduct">
<option value="">Select Product</option>
</select>

<input type="number" id="orderQty"
placeholder="Order Quantity">

<button onclick="saveOrder()">
Save Order
</button>

</div>

<div class="box">

<h2>Order History</h2>

<div id="orderList"></div>

</div>

</div>

<!-- RETURN PAGE -->

<div id="returnPage" class="page">

<div class="box">

<h2>Return Product</h2>

<select id="returnProduct">
<option value="">Select Product</option>
</select>

<input type="number" id="returnQty"
placeholder="Return Quantity">

<button onclick="returnProductFunc()">
Return Product
</button>

</div>

<div class="box">

<h2>Return History</h2>

<div id="returnList"></div>

</div>

</div>

<!-- REPORT PAGE -->

<div id="reportPage" class="page">

<div class="box">

<h2>Stock History</h2>

<div id="stockHistoryList"></div>

</div>

</div>

</div>

<script>

function showPage(pageId){

const pages =
document.querySelectorAll('.page');

pages.forEach((page)=>{

page.classList.remove('activePage');

});

document.getElementById(pageId)
.classList.add('activePage');

}

</script>
