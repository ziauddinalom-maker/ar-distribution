<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR Distribution</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:15px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
max-width:600px;
margin:auto;
margin-top:20px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

input,button,select{
width:100%;
padding:10px;
margin-top:10px;
box-sizing:border-box;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#0d6efd;
color:white;
border:none;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.item{
background:#ffffff;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #eee;
}

.lowStock{
color:red;
font-weight:bold;
}

#dashboard{
display:none;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="box" id="loginPage">

<h2>Admin Login</h2>

<input
type="email"
id="email"
placeholder="Email"
>

<input
type="password"
id="password"
placeholder="Password"
>

<button onclick="login()">
Login
</button>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<!-- PURCHASE -->

<div class="box">

<h2>Purchase Entry</h2>

<input
type="text"
id="purchaseName"
placeholder="Product Name"
>

<input
type="number"
id="buyPrice"
placeholder="Buy Price"
>

<input
type="number"
id="sellPrice"
placeholder="Sell Price"
>

<input
type="number"
id="purchaseQty"
placeholder="Quantity"
>

<button onclick="savePurchase()">
Save Purchase
</button>

</div>

<!-- SALES -->

<div class="box">

<h2>Sales Entry</h2>

<select id="productSelect">
<option>Select Product</option>
</select>

<input
type="number"
id="saleQty"
placeholder="Sale Quantity"
>

<button onclick="saveSale()">
Save Sale
</button>

</div>

<!-- RETURN -->

<div class="box">

<h2>Return Product</h2>

<select id="returnProduct">
<option>Select Product</option>
</select>

<input
type="number"
id="returnQty"
placeholder="Return Quantity"
>

<button onclick="returnProductFunc()">
Return Product
</button>

</div>

<!-- DASHBOARD REPORT -->

<div class="box">

<h2>Dashboard</h2>

<p id="totalProducts">
Total Stock: 0
</p>

<p id="totalSales">
Total Sales: 0
</p>

<p id="totalProfit">
Total Profit: 0
</p>

</div>

<!-- DAILY MONTHLY REPORT -->

<div class="box">

<h2>Daily & Monthly Report</h2>

<p id="dailySales">
Daily Sales: 0
</p>

<p id="dailyProfit">
Daily Profit: 0
</p>

<p id="monthlySales">
Monthly Sales: 0
</p>

<p id="monthlyProfit">
Monthly Profit: 0
</p>

</div>

<!-- SEARCH -->

<div class="box">

<h2>Search Product</h2>

<input
type="text"
id="searchInput"
placeholder="Search Product"
onkeyup="searchProduct()"
>

</div>

<!-- PRODUCT LIST -->

<div class="box">

<h2>Product List</h2>

<div id="productList"></div>

</div>

<!-- SALES HISTORY -->

<div class="box">

<h2>Sales History</h2>

<div id="salesList"></div>

</div>

<!-- RETURN HISTORY -->

<div class="box">

<h2>Return History</h2>

<div id="returnList"></div>

</div>

<!-- PDF -->

<div class="box">

<button onclick="downloadPDF()">
Download PDF
</button>

</div>

</div>
