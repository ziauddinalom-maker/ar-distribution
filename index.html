<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AR Distribution</title>

<style>
body{
font-family:Arial;
margin:0;
padding:10px;
background:#f1f1f1;
}

.box{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

input,select,button{
width:100%;
padding:10px;
margin-top:8px;
border-radius:6px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
background:#0d6efd;
color:white;
border:none;
}

.item{
padding:10px;
background:#fafafa;
margin-top:10px;
border-radius:8px;
}
</style>
</head>
<body>

<div class="box">
<h2>Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
</div>

<div class="box purchaseBox">
<h2>Purchase</h2>
<select id="purchaseSelect"></select>
<input type="text" id="productName" placeholder="Product Name">
<input type="number" id="buyPrice" placeholder="Buy Price">
<input type="number" id="sellPrice" placeholder="Sell Price">
<input type="number" id="stock" placeholder="Stock">
<button onclick="addPurchase()">Save Purchase</button>
</div>

<div class="box">
<h2>Dashboard</h2>
<p id="totalProducts">Total Stock: 0</p>
<p id="totalSales">Total Sales: 0</p>
<p id="totalProfit">Total Profit: 0</p>
</div>

<div class="box">
<h2>Daily & Monthly Report</h2>
<p id="dailySales">Daily Sales: 0</p>
<p id="dailyProfit">Daily Profit: 0</p>
<p id="monthlySales">Monthly Sales: 0</p>
<p id="monthlyProfit">Monthly Profit: 0</p>
</div>

<div class="box">
<input type="text" id="searchInput" placeholder="Search Product" onkeyup="searchProduct()">
<button onclick="downloadPDF()">Download PDF Invoice</button>
<h2>Products</h2>
<div id="productList"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
updateDoc,
getDoc,
deleteDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "YOUR-API-KEY",
authDomain: "YOUR-DOMAIN",
projectId: "YOUR-PROJECT-ID",
storageBucket: "YOUR-STORAGE",
messagingSenderId: "YOUR-SENDER-ID",
appId: "YOUR-APP-ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentRole = "";

window.login = async function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

await signInWithEmailAndPassword(auth,email,password);

alert("Login Success");

};

window.logout = async function(){
await signOut(auth);
location.reload();
};

onAuthStateChanged(auth, async(user)=>{

if(user){

const usersSnapshot = await getDocs(collection(db,"users"));

usersSnapshot.forEach((d)=>{
const data = d.data();
if(data.email === user.email){
currentRole = data.role;
}
});

if(currentRole === "officer"){
document.querySelector(".purchaseBox").style.display = "none";
}

loadProducts();
loadDashboard();
loadReports();

}

});

window.addPurchase = async function(){

const name = document.getElementById("productName").value;
const buy = Number(document.getElementById("buyPrice").value);
const sell = Number(document.getElementById("sellPrice").value);
const stock = Number(document.getElementById("stock").value);

await addDoc(collection(db,"products"),{
name,
buy,
sell,
stock
});

alert("Saved");

loadProducts();
loadDashboard();
loadReports();

};

async function loadProducts(){

const snapshot = await getDocs(collection(db,"products"));

let html = "";
let options = "<option>Select Product</option>";

snapshot.forEach((docSnap)=>{

const data = docSnap.data();

options += `<option>${data.name}</option>`;

html += `
<div class="item">
<b>${data.name}</b>
<br>
Buy: ${data.buy}
<br>
Sell: ${data.sell}
<br>
Stock: ${data.stock}
<br>
${data.stock <= 5 ? "⚠️ Low Stock" : ""}
<br>
<button onclick="deleteProduct('${docSnap.id}')">Delete</button>
</div>
`;

});

document.getElementById("productList").innerHTML = html;
document.getElementById("purchaseSelect").innerHTML = options;

}

window.deleteProduct = async function(id){

if(currentRole === "officer"){
alert("No Permission");
return;
}

await deleteDoc(doc(db,"products",id));

loadProducts();
loadDashboard();
loadReports();

};

async function loadDashboard(){

const snapshot = await getDocs(collection(db,"products"));

let totalStock = 0;

snapshot.forEach((d)=>{
const data = d.data();
totalStock += Number(data.stock || 0);
});

document.getElementById("totalProducts").innerHTML =
"Total Stock: " + totalStock;

}

async function loadReports(){

const snapshot = await getDocs(collection(db,"sales"));

let dailySales = 0;
let dailyProfit = 0;
let monthlySales = 0;
let monthlyProfit = 0;

const today = new Date().toLocaleDateString();
const currentMonth = new Date().getMonth();

snapshot.forEach((d)=>{

const data = d.data();
const saleDate = new Date(data.date);

if(saleDate.toLocaleDateString() === today){
dailySales += data.qty || 0;
dailyProfit += data.profit || 0;
}

if(saleDate.getMonth() === currentMonth){
monthlySales += data.qty || 0;
monthlyProfit += data.profit || 0;
}

});

document.getElementById("dailySales").innerHTML = "Daily Sales: " + dailySales;
document.getElementById("dailyProfit").innerHTML = "Daily Profit: " + dailyProfit;
document.getElementById("monthlySales").innerHTML = "Monthly Sales: " + monthlySales;
document.getElementById("monthlyProfit").innerHTML = "Monthly Profit: " + monthlyProfit;

}

window.searchProduct = function(){

const input = document.getElementById("searchInput").value.toLowerCase();

const items = document.querySelectorAll(".item");

items.forEach((item)=>{

if(item.innerText.toLowerCase().includes(input)){
item.style.display = "block";
}else{
item.style.display = "none";
}

});

};

window.downloadPDF = function(){
window.print();
};

</script>

</body>
</html>
