<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR Distribution</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:15px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
max-width:600px;
margin:auto;
margin-top:20px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

input,button,select{
width:100%;
padding:10px;
margin-top:10px;
box-sizing:border-box;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#0d6efd;
color:white;
border:none;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.item{
background:#ffffff;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #eee;
}

.lowStock{
color:red;
font-weight:bold;
}

#dashboard{
display:none;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="box" id="loginPage">

<h2>Admin Login</h2>

<input
type="email"
id="email"
placeholder="Email"
>

<input
type="password"
id="password"
placeholder="Password"
>

<button onclick="login()">
Login
</button>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<!-- PURCHASE -->

<div class="box">

<h2>Purchase Entry</h2>

<input
type="text"
id="purchaseName"
placeholder="Product Name"
>

<input
type="number"
id="buyPrice"
placeholder="Buy Price"
>

<input
type="number"
id="sellPrice"
placeholder="Sell Price"
>

<input
type="number"
id="purchaseQty"
placeholder="Quantity"
>

<button onclick="savePurchase()">
Save Purchase
</button>

</div>

<!-- SALES -->

<div class="box">

<h2>Sales Entry</h2>

<select id="productSelect">
<option>Select Product</option>
</select>

<input
type="number"
id="saleQty"
placeholder="Sale Quantity"
>

<button onclick="saveSale()">
Save Sale
</button>

</div>

<!-- RETURN -->

<div class="box">

<h2>Return Product</h2>

<select id="returnProduct">
<option>Select Product</option>
</select>

<input
type="number"
id="returnQty"
placeholder="Return Quantity"
>

<button onclick="returnProductFunc()">
Return Product
</button>

</div>

<!-- DASHBOARD REPORT -->

<div class="box">

<h2>Dashboard</h2>

<p id="totalProducts">
Total Stock: 0
</p>

<p id="totalSales">
Total Sales: 0
</p>

<p id="totalProfit">
Total Profit: 0
</p>

</div>

<!-- DAILY MONTHLY REPORT -->

<div class="box">

<h2>Daily & Monthly Report</h2>

<p id="dailySales">
Daily Sales: 0
</p>

<p id="dailyProfit">
Daily Profit: 0
</p>

<p id="monthlySales">
Monthly Sales: 0
</p>

<p id="monthlyProfit">
Monthly Profit: 0
</p>

</div>

<!-- SEARCH -->

<div class="box">

<h2>Search Product</h2>

<input
type="text"
id="searchInput"
placeholder="Search Product"
onkeyup="searchProduct()"
>

</div>

<!-- PRODUCT LIST -->

<div class="box">

<h2>Product List</h2>

<div id="productList"></div>

</div>

<!-- SALES HISTORY -->

<div class="box">

<h2>Sales History</h2>

<div id="salesList"></div>

</div>

<!-- RETURN HISTORY -->

<div class="box">

<h2>Return History</h2>

<div id="returnList"></div>

</div>

<!-- PDF -->

<div class="box">

<button onclick="downloadPDF()">
Download PDF
</button>

</div>

</div>

<script type="module">

}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



// FIREBASE CONFIG

const firebaseConfig = {

authDomain: "ar-distribution-ca285.firebaseapp.com",

projectId: "ar-distribution-ca285",

storageBucket: "ar-distribution-ca285.firebasestorage.app",

messagingSenderId: "668942550210",

appId: "1:668942550210:web:4b1bccf00766a3c274275b"

};



// FIREBASE START

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);



// AUTO LOGIN

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("loginPage").style.display =
"none";

document.getElementById("dashboard").style.display =
"block";

loadProducts();

loadSales();

loadReturns();

loadDashboard();

loadReports();

}

});



// LOGIN

window.login = async function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

alert("Login Successful");

document.getElementById("loginPage").style.display =
"none";

document.getElementById("dashboard").style.display =
"block";

loadProducts();

loadSales();

loadReturns();

loadDashboard();

loadReports();

}catch(error){

alert(error.message);

}

};



// LOGOUT

window.logout = async function(){

await signOut(auth);

location.reload();

};



// SAVE PURCHASE

window.savePurchase = async function(){

const name =
document.getElementById("purchaseName").value;

const buyPrice =
Number(document.getElementById("buyPrice").value);

const sellPrice =
Number(document.getElementById("sellPrice").value);

const qty =
Number(document.getElementById("purchaseQty").value);

if(!name || qty<=0){

alert("Enter valid data");

return;

}

await addDoc(collection(db,"products"),{

name,
buyPrice,
sellPrice,
stock: qty

});

alert("Purchase Saved");

document.getElementById("purchaseName").value = "";

document.getElementById("buyPrice").value = "";

document.getElementById("sellPrice").value = "";

document.getElementById("purchaseQty").value = "";

loadProducts();

loadDashboard();

};



// LOAD PRODUCTS

async function loadProducts(){

const querySnapshot =
await getDocs(collection(db,"products"));

let html = "";

let options =
"<option>Select Product</option>";

querySnapshot.forEach((docSnap)=>{

const data = docSnap.data();

html += `
<div class="item">

<b>${data.name}</b>

<br><br>

Buy Price: ${data.buyPrice}

<br>

Sell Price: ${data.sellPrice}

<br>

Stock: ${data.stock}

<br>

${data.stock <= 5
? '<span class="lowStock">⚠️ Low Stock</span>'
: ''
}

<br><br>

<button onclick="deleteProduct('${docSnap.id}')">
Delete
</button>

</div>
`;

options += `
<option value="${docSnap.id}">
${data.name}
</option>
`;

});

document.getElementById("productList").innerHTML =
html;

document.getElementById("productSelect").innerHTML =
options;

document.getElementById("returnProduct").innerHTML =
options;

}



// DELETE PRODUCT

window.deleteProduct = async function(id){

if(confirm("Delete this product?")){

await deleteDoc(doc(db,"products",id));

loadProducts();

loadDashboard();

}

};

const productId =
document.getElementById("productSelect").value;

const qty =
Number(document.getElementById("saleQty").value);

const productRef =
doc(db,"products",productId);

const productSnap =
await getDoc(productRef);

const productData =
productSnap
