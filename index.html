<!-- ===================================
AR DISTRIBUTION PROFESSIONAL SYSTEM
ORDER = AUTO SALES
RETURN = AUTO SALES MINUS
=================================== -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AR Distribution</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:15px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
max-width:700px;
margin:auto;
margin-top:20px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
background:#0d6efd;
color:white;
border:none;
cursor:pointer;
}

.deleteBtn{
background:red;
}

.item{
background:#fafafa;
padding:10px;
border-radius:8px;
margin-top:10px;
border:1px solid #ddd;
}

.lowStock{
color:red;
font-weight:bold;
}

#dashboard{
display:none;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="box" id="loginPage">

<h2>Admin Login</h2>

<input
type="email"
id="email"
placeholder="Email"
>

<input
type="password"
id="password"
placeholder="Password"
>

<button onclick="login()">
Login
</button>

</div>

<!-- MAIN DASHBOARD -->

<div id="dashboard">

<!-- ADD PRODUCT -->

<div class="box">

<h2>Add New Product</h2>

<input
type="text"
id="newProductName"
placeholder="Product Name"
>

<input
type="number"
id="newBuyPrice"
placeholder="Buy Price"
>

<input
type="number"
id="newSellPrice"
placeholder="Sell Price"
>

<input
type="number"
id="openingStock"
placeholder="Opening Stock"
>

<button onclick="addNewProduct()">
Add Product
</button>

</div>

<!-- PURCHASE -->

<div class="box">

<h2>Purchase Entry</h2>

<select id="purchaseProduct">
<option value="">
Select Product
</option>
</select>

<input
type="number"
id="purchaseQty"
placeholder="Purchase Quantity"
>

<button onclick="savePurchase()">
Add Stock
</button>

</div>

<!-- ORDER ENTRY -->

<div class="box">

<h2>Order Entry</h2>

<input
type="text"
id="customerName"
placeholder="Customer Name"
>

<select id="orderProduct">
<option value="">
Select Product
</option>
</select>

<input
type="number"
id="orderQty"
placeholder="Order Quantity"
>

<button onclick="saveOrder()">
Save Order
</button>

</div>

<!-- RETURN -->

<div class="box">

<h2>Return Product</h2>

<select id="returnProduct">
<option value="">
Select Product
</option>
</select>

<input
type="number"
id="returnQty"
placeholder="Return Quantity"
>

<button onclick="returnProductFunc()">
Return Product
</button>

</div>

<!-- DASHBOARD -->

<div class="box">

<h2>Dashboard</h2>

<p id="totalStock">
Total Stock: 0
</p>

<p id="totalSales">
Total Sales: 0
</p>

<p id="totalProfit">
Total Profit: 0
</p>

</div>

<!-- SEARCH -->

<div class="box">

<h2>Search Product</h2>

<input
type="text"
id="searchInput"
placeholder="Search Product"
onkeyup="searchProduct()"
>

</div>

<!-- PRODUCT LIST -->

<div class="box">

<h2>Product List</h2>

<div id="productList"></div>

</div>

<!-- ORDER HISTORY -->

<div class="box">

<h2>Order History</h2>

<div id="orderList"></div>

</div>

<!-- RETURN HISTORY -->

<div class="box">

<h2>Return History</h2>

<div id="returnList"></div>

</div>

</div>

<!-- FIREBASE SCRIPT -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
updateDoc,
getDoc,
deleteDoc,
query,
where
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyCFXN4xMfhMVEcGMwMMe1wrrSDoMqEkspQ",

authDomain: "ar-distribution-ca285.firebaseapp.com",

projectId: "ar-distribution-ca285",

storageBucket: "ar-distribution-ca285.firebasestorage.app",

messagingSenderId: "668942550210",

appId: "1:668942550210:web:4b1bccf00766a3c274275b"

};



/* START FIREBASE */

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);



/* AUTO LOGIN */

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("loginPage")
.style.display = "none";

document.getElementById("dashboard")
.style.display = "block";

loadProducts();
loadOrders();
loadReturns();
loadDashboard();

}

});



/* LOGIN */

window.login = async function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

alert("Login Successful");

}catch(error){

alert(error.message);

}

};



/* ADD PRODUCT */

window.addNewProduct = async function(){

const name =
document.getElementById("newProductName")
.value.trim();

const buyPrice =
Number(document.getElementById("newBuyPrice")
.value);

const sellPrice =
Number(document.getElementById("newSellPrice")
.value);

const stock =
Number(document.getElementById("openingStock")
.value);

if(!name){

alert("Enter Product Name");

return;

}



/* DUPLICATE CHECK */

const q = query(
collection(db,"products"),
where("name","==",name)
);

const snapshot = await getDocs(q);

if(!snapshot.empty){

alert("Product Already Exists");

return;

}



/* SAVE PRODUCT */

await addDoc(collection(db,"products"),{

name,
buyPrice,
sellPrice,
stock

});

alert("Product Added");

loadProducts();
loadDashboard();

};



/* PURCHASE */

window.savePurchase = async function(){

const productId =
document.getElementById("purchaseProduct")
.value;

const qty =
Number(document.getElementById("purchaseQty")
.value);

if(!productId){

alert("Select Product");

return;

}

const productRef =
doc(db,"products",productId);

const productSnap =
await getDoc(productRef);

const data =
productSnap.data();



await updateDoc(productRef,{

stock:Number(data.stock) + qty

});



await addDoc(collection(db,"purchases"),{

product:data.name,
qty,
date:new Date().toLocaleString()

});

alert("Purchase Saved");

loadProducts();
loadDashboard();

};



/* ORDER ENTRY */

window.saveOrder = async function(){

const customer =
document.getElementById("customerName")
.value;

const productId =
document.getElementById("orderProduct")
.value;

const qty =
Number(document.getElementById("orderQty")
.value);

if(!productId){

alert("Select Product");

return;

}

const productRef =
doc(db,"products",productId);

const productSnap =
await getDoc(productRef);

const data =
productSnap.data();



if(data.stock < qty){

alert("Not Enough Stock");

return;

}



/* AUTO STOCK MINUS */

await updateDoc(productRef,{

stock:Number(data.stock) - qty

});



/* AUTO PROFIT */

const profit =
(Number(data.sellPrice)
- Number(data.buyPrice))
* qty;



/* SAVE ORDER */

await addDoc(collection(db,"orders"),{

customer,
product:data.name,
qty,
profit,
date:new Date().toLocaleString()

});

alert("Order Saved");

loadProducts();
loadOrders();
loadDashboard();

};



/* RETURN */

window.returnProductFunc = async function(){

const productId =
document.getElementById("returnProduct")
.value;

const qty =
Number(document.getElementById("returnQty")
.value);

if(!productId){

alert("Select Product");

return;

}

const productRef =
doc(db,"products",productId);

const productSnap =
await getDoc(productRef);

const data =
productSnap.data();



/* STOCK PLUS */

await updateDoc(productRef,{

stock:Number(data.stock) + qty

});



/* RETURN SAVE */

await addDoc(collection(db,"returns"),{

product:data.name,
qty,
date:new Date().toLocaleString()

});

alert("Return Saved");

loadProducts();
loadReturns();
loadDashboard();

};



/* LOAD PRODUCTS */

async function loadProducts(){

const snapshot =
await getDocs(collection(db,"products"));

let html = "";

let options =
'<option value="">Select Product</option>';

snapshot.forEach((docSnap)=>{

const data = docSnap.data();

html += `

<div class="item">

<b>${data.name}</b>

<br><br>

Buy Price: ${data.buyPrice}

<br>

Sell Price: ${data.sellPrice}

<br>

Stock: ${data.stock}

<br>

${data.stock <= 5
? '<span class="lowStock">⚠️ Low Stock</span>'
: ''
}

<br><br>

<button
class="deleteBtn"
onclick="deleteProduct('${docSnap.id}')"
>

Delete Product

</button>

</div>

`;

options += `

<option value="${docSnap.id}">
${data.name}
</option>

`;

});

document.getElementById("productList")
.innerHTML = html;

document.getElementById("purchaseProduct")
.innerHTML = options;

document.getElementById("orderProduct")
.innerHTML = options;

document.getElementById("returnProduct")
.innerHTML = options;

}



/* DELETE PRODUCT */

window.deleteProduct = async function(id){

await deleteDoc(doc(db,"products",id));

alert("Product Deleted");

loadProducts();
loadDashboard();

};



/* LOAD ORDERS */

async function loadOrders(){

const snapshot =
await getDocs(collection(db,"orders"));

let html = "";

snapshot.forEach((docSnap)=>{

const data = docSnap.data();

html += `

<div class="item">

Customer: ${data.customer}

<br>

Product: ${data.product}

<br>

Qty: ${data.qty}

<br>

Profit: ${data.profit}

<br>

Date: ${data.date}

</div>

`;

});

document.getElementById("orderList")
.innerHTML = html;

}



/* LOAD RETURNS */

async function loadReturns(){

const snapshot =
await getDocs(collection(db,"returns"));

let html = "";

snapshot.forEach((docSnap)=>{

const data = docSnap.data();

html += `

<div class="item">

Product: ${data.product}

<br>

Qty: ${data.qty}

<br>

Date: ${data.date}

</div>

`;

});

document.getElementById("returnList")
.innerHTML = html;

}



/* DASHBOARD */

async function loadDashboard(){

const productSnapshot =
await getDocs(collection(db,"products"));

const orderSnapshot =
await getDocs(collection(db,"orders"));

let totalStock = 0;

let totalSales = 0;

let totalProfit = 0;



productSnapshot.forEach((docSnap)=>{

const data = docSnap.data();

totalStock += Number(data.stock || 0);

});



orderSnapshot.forEach((docSnap)=>{

const data = docSnap.data();

totalSales += Number(data.qty || 0);

totalProfit += Number(data.profit || 0);

});



document.getElementById("totalStock")
.innerHTML =
"Total Stock: " + totalStock;

document.getElementById("totalSales")
.innerHTML =
"Total Sales: " + totalSales;

document.getElementById("totalProfit")
.innerHTML =
"Total Profit: " + totalProfit;

}



/* SEARCH */

window.searchProduct = function(){

const input =
document.getElementById("searchInput")
.value
.toLowerCase();

const items =
document.querySelectorAll(".item");

items.forEach((item)=>{

if(
item.innerText.toLowerCase()
.includes(input)
){

item.style.display = "block";

}else{

item.style.display = "none";

}

});

};

</script>

</body>
  </html>
