<!DOCTYPE html>
<html>

<head>
  <title>AR Distribution Login</title>

  <style>

    body{
      font-family:Arial;
      background:#f5f5f5;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .login-box{
      background:white;
      padding:30px;
      border-radius:10px;
      width:300px;
    }

    input,button{
      width:100%;
      padding:10px;
      margin-top:10px;
    }

    button{
      background:#0d6efd;
      color:white;
      border:none;
    }

  </style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">
Login
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

  apiKey: "AIzaSyCFXN4xMfhMVEcGMwMMe1wrrSDoMqEkspQ",

  authDomain: "ar-distribution-ca285.firebaseapp.com",

  projectId: "ar-distribution-ca285",

  storageBucket: "ar-distribution-ca285.firebasestorage.app",

  messagingSenderId: "668942550210",

  appId: "1:668942550210:web:4b1bccf00766a3c274275b"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.login = async function(){

  const email =
  document.getElementById("email").value;

  const password =
  document.getElementById("password").value;

  try{

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

    alert("Login Successful");
    wwindow.location.href=
      "dashboard.html";

  }catch(error){

    alert(error.message);

  }

};

</script>

</body>
</html>
