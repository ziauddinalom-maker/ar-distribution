<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR Distribution</title>

<style>

body{
  font-family:Arial;
  background:#f5f5f5;
  margin:0;
  padding:20px;
}

.box{
  background:white;
  padding:20px;
  border-radius:10px;
  max-width:500px;
  margin:auto;
  margin-top:20px;
}

input,button,select{
  width:100%;
  padding:10px;
  margin-top:10px;
}

button{
  background:#0d6efd;
  color:white;
  border:none;
  cursor:pointer;
}

.item{
  background:#ffffff;
  padding:10px;
  margin-top:10px;
  border-radius:5px;
}

#dashboard{
  display:none;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="box" id="loginPage">

<h2>Admin Login</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">
Login
</button>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<div class="box">

<h2>Add Product</h2>

<input type="text" id="name" placeholder="Product Name">

<input type="number" id="stock" placeholder="Stock Quantity">

<button onclick="saveProduct()">
Save Product
</button>

</div>

<div class="box">

<h2>Sales Entry</h2>

<select id="productSelect">
<option>Select Product</option>
</select>

<input type="number" id="saleQty" placeholder="Sale Quantity">

<button onclick="saveSale()">
Save Sale
</button>

</div>

<div class="box">

<h2>Return Product</h2>

<select id="returnProduct">
<option>Select Product</option>
</select>

<input type="number" id="returnQty" placeholder="Return Quantity">

<button onclick="returnProductFunc()">
Return Product
</button>

</div>

<div class="box">

<h2>Product List</h2>

<div id="productList"></div>

</div>

<div class="box">

<h2>Sales History</h2>

<div id="salesList"></div>

</div>

<div class="box">

<h2>Return History</h2>

<div id="returnList"></div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
updateDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyCFXN4xMfhMVEcGMwMMe1wrrSDoMqEkspQ",

authDomain: "ar-distribution-ca285.firebaseapp.com",

projectId: "ar-distribution-ca285",

storageBucket: "ar-distribution-ca285.firebasestorage.app",

messagingSenderId: "668942550210",

appId: "1:668942550210:web:4b1bccf00766a3c274275b"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

window.login = async function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

alert("Login Successful");

document.getElementById("loginPage").style.display = "none";

document.getElementById("dashboard").style.display = "block";

loadProducts();

loadSales();

loadReturns();

}catch(error){

alert(error.message);

}

};

window.saveProduct = async function(){

const name =
document.getElementById("name").value;

const stock =
Number(document.getElementById("stock").value);

await addDoc(collection(db,"products"),{

name,
stock

});

alert("Product Saved");

loadProducts();

};

async function loadProducts(){

const querySnapshot =
await getDocs(collection(db,"products"));

let html = "";

let options = "<option>Select Product</option>";

querySnapshot.forEach((docSnap)=>{

const data = docSnap.data();

html += `
<div class="item">

Product: ${data.name}

<br>

Stock: ${data.stock}

</div>
`;

options += `
<option value="${docSnap.id}">
${data.name}
</option>
`;

});

document.getElementById("productList").innerHTML = html;

document.getElementById("productSelect").innerHTML = options;

document.getElementById("returnProduct").innerHTML = options;

}

window.saveSale = async function(){

const productId =
document.getElementById("productSelect").value;

const qty =
Number(document.getElementById("saleQty").value);

const productRef =
doc(db,"products",productId);

const productSnap =
await getDoc(productRef);

const productData =
productSnap.data();

if(productData.stock < qty){

alert("Not Enough Stock");

return;

}

await updateDoc(productRef,{

stock: productData.stock - qty

});

await addDoc(collection(db,"sales"),{

product: productData.name,
qty,
date:new Date().toLocaleString()

});

alert("Sale Saved");

loadProducts();

loadSales();

};

window.returnProductFunc = async function(){

const productId =
document.getElementById("returnProduct").value;

const qty =
Number(document.getElementById("returnQty").value);

const productRef =
doc(db,"products",productId);

const productSnap =
await getDoc(productRef);

const productData =
productSnap.data();

await updateDoc(productRef,{

stock: productData.stock + qty

});

await addDoc(collection(db,"returns"),{

product: productData.name,
qty,
date:new Date().toLocaleString()

});

alert("Return Saved");

loadProducts();

loadReturns();

};

async function loadSales(){

const querySnapshot =
await getDocs(collection(db,"sales"));

let html = "";

querySnapshot.forEach((docSnap)=>{

const data = docSnap.data();

html += `
<div class="item">

Product: ${data.product}

<br>

Qty: ${data.qty}

<br>

Date: ${data.date}

</div>
`;

});

document.getElementById("salesList").innerHTML = html;

}

async function loadReturns(){

const querySnapshot =
await getDocs(collection(db,"returns"));

let html = "";

querySnapshot.forEach((docSnap)=>{

const data = docSnap.data();

html += `
<div class="item">

Product: ${data.product}

<br>

Return Qty: ${data.qty}

<br>

Date: ${data.date}

</div>
`;

});

document.getElementById("returnList").innerHTML = html;

}

</script>

</body>
</html>
