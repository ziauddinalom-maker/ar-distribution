<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AR Distribution</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

</head>

<body style="font-family:sans-serif;text-align:center;padding-top:100px;background:#eaf3ff;">

<h1 style="color:#1565c0;">AR Distribution</h1>

<p>Distribution Management System</p>

<input id="email" placeholder="Email" style="padding:10px;width:250px;"><br><br>

<input id="password" type="password" placeholder="Password" style="padding:10px;width:250px;"><br><br>

<button onclick="login()" style="padding:10px 30px;background:#1565c0;color:white;border:none;">
Login
</button>

<p id="message"></p>

<script>

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);

function login() {

const email = document.getElementById('email').value;
const password = document.getElementById('password').value;

firebase.auth().signInWithEmailAndPassword(email, password)

.then(() => {
document.getElementById('message').innerHTML = "Login Successful";
})

.catch((error) => {
document.getElementById('message').innerHTML = error.message;
});

}

</script>

</body>
</html>
