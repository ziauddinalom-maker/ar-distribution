<!-- =========================
AR DISTRIBUTION FULL SYSTEM
========================= -->

<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR Distribution</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:15px;
}

.box{
background:#fff;
padding:20px;
border-radius:10px;
margin:auto;
margin-top:20px;
max-width:700px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
background:#0d6efd;
color:white;
border:none;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.deleteBtn{
background:red;
}

.item{
border:1px solid #ddd;
padding:10px;
border-radius:8px;
margin-top:10px;
}

.lowStock{
color:red;
font-weight:bold;
}

#dashboard{
display:none;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div class="box" id="loginPage">

<h2>Admin Login</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<!-- ADD PRODUCT -->

<div class="box">

<h2>Add New Product</h2>

<input type="text" id="newProductName" placeholder="Product Name">

<input type="number" id="newBuyPrice" placeholder="Buy Price">

<input type="number" id="newSellPrice" placeholder="Sell Price">

<input type="number" id="openingStock" placeholder="Opening Stock">

<button onclick="addNewProduct()">
Add Product
</button>

</div>

<!-- PURCHASE -->

<div class="box">

<h2>Purchase Entry</h2>

<select id="purchaseProduct">
<option>Select Product</option>
</select>

<input type="number" id="purchaseQty" placeholder="Purchase Quantity">

<button onclick="savePurchase()">
Add Purchase Stock
</button>

</div>

<!-- SALES -->

<div class="box">

<h2>Sales Entry</h2>

<select id="saleProduct">
<option>Select Product</option>
</select>

<input type="number" id="saleQty" placeholder="Sale Quantity">

<button onclick="saveSale()">
Save Sale
</button>

</div>

<!-- RETURN -->

<div class="box">

<h2>Return Product</h2>

<select id="returnProduct">
<option>Select Product</option>
</select>

<input type="number" id="returnQty" placeholder="Return Quantity">

<button onclick="returnProductFunc()">
Return Product
</button>

</div>

<!-- DASHBOARD REPORT -->

<div class="box">

<h2>Dashboard</h2>

<p id="totalStock">Total Stock: 0</p>

<p id="totalSales">Total Sales: 0</p>

<p id="totalProfit">Total Profit: 0</p>

</div>

<!-- SEARCH -->

<div class="box">

<h2>Search Product</h2>

<input
type="text"
id="searchInput"
placeholder="Search Product"
onkeyup="searchProduct()"
>

</div>

<!-- PRODUCT LIST -->

<div class="box">

<h2>Product List</h2>

<div id="productList"></div>

</div>

<!-- SALES HISTORY -->

<div class="box">

<h2>Sales History</h2>

<div id="salesList"></div>

</div>

<!-- RETURN HISTORY -->

<div class="box">

<h2>Return History</h2>

<div id="returnList"></div>

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
updateDoc,
getDoc,
deleteDoc,
query,
where
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



// FIREBASE CONFIG

const firebaseConfig = {

apiKey: "YOUR_API_KEY",

authDomain: "YOUR_AUTH_DOMAIN",

projectId: "YOUR_PROJECT_ID",

storageBucket: "YOUR_BUCKET",

messagingSenderId: "YOUR_MSG_ID",

appId: "YOUR_APP_ID"

};



// INIT

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);



// AUTO LOGIN

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("loginPage").style.display = "none";

document.getElementById("dashboard").style.display = "block";

loadProducts();
loadSales();
loadReturns();
loadDashboard();

}

});



// LOGIN

window.login = async function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

alert("Login Success");

}catch(error){

alert(error.message);

}

};



// ADD NEW PRODUCT

window.addNewProduct = async function(){

const name =
document.getElementById("newProductName").value;

const buyPrice =
Number(document.getElementById("newBuyPrice").value);

const sellPrice =
Number(document.getElementById("newSellPrice").value);

const stock =
Number(document.getElementById("openingStock").value);

if(!name){

alert("Enter Product Name");

return;

}



// DUPLICATE CHECK

const q = query(
collection(db,"products"),
where("name","==",name)
);

const snapshot = await getDocs(q);

if(!snapshot.empty){

alert("Product Already Exists");

return;

}



await addDoc(collection(db,"products"),{

name,
buyPrice,
sellPrice,
stock

});

alert("Product Added");

loadProducts();
loadDashboard();

};



// PURCHASE STOCK

window.savePurchase = async function(){

const productId =
document.getElementById("purchaseProduct").value;

const qty =
Number(document.getElementById("purchaseQty").value);

const productRef =
doc(db,"products",productId);

const snap =
await getDoc(productRef);

const data =
snap.data();

await updateDoc(productRef,{

stock: data.stock + qty

});

await addDoc(collection(db,"purchases"),{

product:data.name,
qty,
date:new Date().toLocaleString()

});

alert("Purchase Saved");

loadProducts();
loadDashboard();

};



// SALES

window.saveSale = async function(){

const productId =
document.getElementById("saleProduct").value;

const qty =
Number(document.getElementById("saleQty").value);

const productRef =
doc(db,"products",productId);

const snap =
await getDoc(productRef);

const data =
snap.data();

if(data.stock < qty){

alert("Not Enough Stock");

return;

}

await updateDoc(productRef,{

stock:data.stock - qty

});

const profit =
(data.sellPrice - data.buyPrice) * qty;

await addDoc(collection(db,"sales"),{

product:data.name,
qty,
profit,
date:new Date().toLocaleString()

});

alert("Sale Saved");

loadProducts();
loadSales();
loadDashboard();

};



// RETURN

window.returnProductFunc = async function(){

const productId =
document.getElementById("returnProduct").value;

const qty =
Number(document.getElementById("returnQty").value);

const productRef =
doc(db,"products",productId);

const snap =
await getDoc(productRef);

const data =
snap.data();

await updateDoc(productRef,{

stock:data.stock + qty

});

await addDoc(collection(db,"returns"),{

product:data.name,
qty,
date:new Date().toLocaleString()

});

alert("Return Saved");

loadProducts();
loadReturns();
loadDashboard();

};



// LOAD PRODUCTS

async function loadProducts(){

const snapshot =
await getDocs(collection(db,"products"));

let html = "";

let options =
"<option>Select Product</option>";

snapshot.forEach((docSnap)=>{

const data = docSnap.data();

html += `

<div class="item">

<b>${data.name}</b>

<br><br>

Buy Price: ${data.buyPrice}

<br>

Sell Price: ${data.sellPrice}

<br>

Stock: ${data.stock}

<br>

${data.stock <= 5
? '<span class="lowStock">⚠️ Low Stock</span>'
: ''
}

<br><br>

<button
class="deleteBtn"
onclick="deleteProduct('${docSnap.id}')"
>

Delete Product

</button>

</div>

`;

options += `

<option value="${docSnap.id}">
${data.name}
</option>

`;

});

document.getElementById("productList").innerHTML =
html;

document.getElementById("purchaseProduct").innerHTML =
options;

document.getElementById("saleProduct").innerHTML =
options;

document.getElementById("returnProduct").innerHTML =
options;

}



// DELETE PRODUCT

window.deleteProduct = async function(id){

await deleteDoc(doc(db,"products",id));

alert("Product Deleted");

loadProducts();
loadDashboard();

};



// LOAD SALES

async function loadSales(){

const snapshot =
await getDocs(collection(db,"sales"));

let html = "";

snapshot.forEach((docSnap)=>{

const data = docSnap.data();

html += `

<div class="item">

Product: ${data.product}

<br>

Qty: ${data.qty}

<br>

Profit: ${data.profit}

<br>

Date: ${data.date}

</div>

`;

});

document.getElementById("salesList").innerHTML =
html;

}



// LOAD RETURNS

async function loadReturns(){

const snapshot =
await getDocs(collection(db,"returns"));

let html = "";

snapshot.forEach((docSnap)=>{

const data = docSnap.data();

html += `

<div class="item">

Product: ${data.product}

<br>

Return Qty: ${data.qty}

<br>

Date: ${data.date}

</div>

`;

});

document.getElementById("returnList").innerHTML =
html;

}



// DASHBOARD

async function loadDashboard(){

const productSnapshot =
await getDocs(collection(db,"products"));

const salesSnapshot =
await getDocs(collection(db,"sales"));

let totalStock = 0;

let totalSales = 0;

let totalProfit = 0;

productSnapshot.forEach((docSnap)=>{

const data = docSnap.data();

totalStock += Number(data.stock || 0);

});

salesSnapshot.forEach((docSnap)=>{

const data = docSnap.data();

totalSales += Number(data.qty || 0);

totalProfit += Number(data.profit || 0);

});

document.getElementById("totalStock").innerHTML =
"Total Stock: " + totalStock;

document.getElementById("totalSales").innerHTML =
"Total Sales: " + totalSales;

document.getElementById("totalProfit").innerHTML =
"Total Profit: " + totalProfit;

};



// SEARCH

window.searchProduct = function(){

const input =
document.getElementById("searchInput")
.value
.toLowerCase();

const items =
document.querySelectorAll(".item");

items.forEach((item)=>{

if(
item.innerText.toLowerCase()
.includes(input)
){

item.style.display = "block";

}else{

item.style.display = "none";

}

});

};

</script>

</body>
  </html>
